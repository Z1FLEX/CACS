spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/scas_db
    username: scas
    password: password

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  redis:
    host: localhost
    port: 6379

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: !secret-key!
  expiration: 3600000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
